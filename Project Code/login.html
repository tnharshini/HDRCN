<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("{{ url_for('static', filename='images/feature6.avif') }}") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .container {
            background: rgba(100, 5, 86, 0.755);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 350px;
            position: relative;
            box-shadow: rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            transform: scale(1.1);
        }
        
        h2 {
            margin-bottom: 5px;
            color: white;
        }
        
        p {
            color: gray;
            font-size: 14px;
        }

        a{
            color:wheat;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            text-align: left;
            font-weight: bold;
            color: white;
        }
        
        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .btn {
            background: blue;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .or {
            margin: 10px 0;
            color: gray;
            font-size: 12px;
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .google, .facebook {
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .google {
            background: white;
            border: 1px solid red;
            color: red;
        }
        
        .facebook {
            background: white;
            border: 1px solid wheat;
            color: wheat;
        }
        
        .switch {
            font-size: 12px;
            margin-top: 10px;
        }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 20px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome Back</h2>
        <p>Login to continue</p>
        <form onsubmit="return loginUser(event)">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="Enter email" required>
            
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password" required>
            
            <button type="submit" class="btn">Login</button>

            <p class="switch">New here? <a href="/register">Create an account</a></p>
        </form>
    </div>

    <script>
function loginUser(event) {
    event.preventDefault();

    let email = document.getElementById('login-email').value;
    let password = document.getElementById('login-password').value;

    fetch('/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email: email, password: password })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Login Successful!');
            window.location.href = "/dashboard"; // Redirect to dashboard
        } else {
            alert('Invalid email or password!');
        }
    })
    .catch(error => console.error('Error:', error));
}
    </script>
</body>
</html>
